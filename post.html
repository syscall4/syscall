<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>syscall - Cargando artículo...</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Estilos adicionales para la página de artículo */
        .article-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .article-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .article-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .article-featured-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .article-content h2 {
            font-size: 1.8rem;
            margin: 2rem 0 1rem;
        }

        .article-content h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 1rem;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content pre {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .article-content code {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .article-content blockquote {
            border-left: 4px solid var(--accent-primary);
            background-color: var(--bg-secondary);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .article-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .article-tag {
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
        }

        .article-tag:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .article-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .nav-prev, .nav-next {
            color: var(--accent-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.2s ease;
        }

        .nav-prev:hover {
            gap: 0.25rem;
        }

        .nav-next:hover {
            gap: 0.75rem;
        }

        .error-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-container h2 {
            font-size: 2rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .error-container p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 2rem 0;
            border-radius: 12px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <a href="/">syscall<span>.</span></a>
            </div>
            <nav>
                <ul>
                    <li><a href="/">/inicio</a></li>
                    <li><a href="/noticias">/noticias</a></li>
                    <li><a href="/blog">/blog</a></li>
                    <li><a href="/tutoriales">/tutoriales</a></li>
                    <li><a href="/about">/about</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="article-page" id="article-container">
        <div class="loader" style="margin: 4rem auto;"></div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>syscall</h4>
                <ul>
                    <li><a href="#">Sobre nosotros</a></li>
                    <li><a href="#">Contacto</a></li>
                    <li><a href="#">Privacidad</a></li>
                    <li><a href="#">Términos</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>explorar</h4>
                <ul>
                    <li><a href="#">Archivo</a></li>
                    <li><a href="#">Autores</a></li>
                    <li><a href="#">Contribuir</a></li>
                    <li><a href="#">RSS</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>social</h4>
                <div class="social-links">
                    <a href="#">GitHub</a>
                    <a href="#">Twitter</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">YouTube</a>
                </div>
            </div>
        </div>
        <div class="copyright">
            <p>© 2024 syscall. Todos los derechos reservados.</p>
            <p style="margin-top: 0.5rem; font-family: monospace;">_exit(0);</p>
        </div>
    </footer>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        const supabaseUrl = 'https://swsrywvjskhshlbtbzrx.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3c3J5d3Zqc2toc2hsYnRienJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDcxMDksImV4cCI6MjA4ODU4MzEwOX0.u9JCI1eyR4yNdTGb9o17vHTDGZJDrO7W62KlkMATd1M'
        const supabase = createClient(supabaseUrl, supabaseKey)

        // Obtener el slug de la URL - AHORA SOLO USA QUERY PARAMETERS
        function getSlugFromUrl() {
            const urlParams = new URLSearchParams(window.location.search)
            const slug = urlParams.get('slug')
            console.log('🔍 Slug desde URL:', slug)
            console.log('📍 URL completa:', window.location.href)
            return slug
        }

        async function loadArticle() {
            const container = document.getElementById('article-container')
            const slug = getSlugFromUrl()
            
            console.log('📝 Slug extraído:', slug)

            if (!slug) {
                container.innerHTML = `
                    <div class="error-container">
                        <h2>❌ Artículo no especificado</h2>
                        <p>No se ha especificado qué artículo quieres ver.</p>
                        <p><small>URL: ${window.location.href}</small></p>
                        <a href="/" class="read-more">← Volver al inicio</a>
                    </div>
                `
                return
            }

            try {
                console.log('🔍 Buscando artículo con slug:', slug)
                
                const { data: article, error } = await supabase
                    .from('articles')
                    .select('*')
                    .eq('slug', slug)
                    .eq('is_published', true)
                    .single()

                if (error) {
                    console.error('❌ Error de Supabase:', error)
                    throw new Error('Artículo no encontrado en la base de datos')
                }

                if (!article) {
                    throw new Error('Artículo no encontrado')
                }

                console.log('✅ Artículo encontrado:', article.title)

                // Incrementar vistas (sin await para no bloquear)
                supabase
                    .from('articles')
                    .update({ views_count: (article.views_count || 0) + 1 })
                    .eq('id', article.id)
                    .then()

                // Formatear fecha
                const publishDate = article.published_at ? new Date(article.published_at).toLocaleDateString('es-ES', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }) : 'Fecha no disponible'

                // Renderizar artículo
                container.innerHTML = `
                    <article>
                        <header class="article-header">
                            <h1>${article.title}</h1>
                            ${article.subtitle ? `<p style="color: var(--text-secondary); font-size: 1.2rem;">${article.subtitle}</p>` : ''}
                            
                            <div class="article-meta">
                                <span>📅 ${publishDate}</span>
                                <span>📁 ${article.category || 'general'}</span>
                                ${article.reading_time ? `<span>⏱️ ${article.reading_time} min lectura</span>` : ''}
                                <span>👁️ ${article.views_count || 0} vistas</span>
                            </div>
                        </header>

                        ${article.featured_image ? `
                            <img src="${article.featured_image}" alt="${article.title}" class="article-featured-image">
                        ` : ''}

                        <div class="article-content">
                            ${article.content || '<p>Contenido no disponible</p>'}
                        </div>

                        ${article.video_url ? `
                            <div class="video-container">
                                <iframe src="${article.video_url.replace('watch?v=', 'embed/')}" 
                                        frameborder="0" 
                                        allowfullscreen>
                                </iframe>
                            </div>
                        ` : ''}

                        <footer class="article-footer">
                            ${article.tags && article.tags.length > 0 ? `
                                <div class="article-tags">
                                    ${article.tags.map(tag => `<span class="article-tag">#${tag}</span>`).join('')}
                                </div>
                            ` : ''}

                            <div class="article-navigation">
                                <a href="/" class="nav-prev">← Volver al inicio</a>
                                <a href="#" class="nav-next" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">↑ Arriba</a>
                            </div>
                        </footer>
                    </article>
                `

                // Actualizar título de la página
                document.title = `${article.title} - syscall`

            } catch (error) {
                console.error('❌ Error:', error)
                container.innerHTML = `
                    <div class="error-container">
                        <h2>❌ Artículo no encontrado</h2>
                        <p>El artículo con slug "${slug}" no existe o ha sido eliminado.</p>
                        <p><small>Error: ${error.message}</small></p>
                        <a href="/" class="read-more">← Volver al inicio</a>
                    </div>
                `
            }
        }

        // Cargar el artículo cuando la página esté lista
        document.addEventListener('DOMContentLoaded', loadArticle)
    </script>
</body>

</html>
